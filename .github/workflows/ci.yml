name: ci
on: [push, pull_request]
jobs:
  agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
      - run: go vet ./...
      - run: go test ./...
  # app job will be added when the Flutter app is scaffolded
